name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm --filter @beyondplusmm/doehpos-sdk build

      - name: Unit tests (offline)
        run: pnpm --filter @beyondplusmm/doehpos-sdk test

      - name: Typecheck Expo reference app
        run: pnpm --filter doeh-expo-reference typecheck

      - name: Typecheck quickstart example (rendered by the developer portal)
        run: pnpm --filter doeh-quickstart typecheck
